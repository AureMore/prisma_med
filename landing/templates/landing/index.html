{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisma Med Solutions | Gestión Médica Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        /* Animación personalizada de parpadeo suave */
        @keyframes soft-fade {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .animate-status {
            animation: soft-fade 2s infinite ease-in-out;
        }

        /* Estilo para el puntito de "en vivo" */
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #67c6ae;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #67c6ae;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-image: url("{% static 'landing/img/fondo.png' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        /* Navbar transparente con efecto Glassmorphism */
        .nav-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .software-window {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .window-header {
            background: rgba(249, 250, 251, 0.8);
            padding: 10px 16px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .dot-red { background: #ff5f57; }
        .dot-yellow { background: #febc2e; }
        .dot-green { background: #28c840; }

        .scribe-textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #374151;
            resize: none;
            background-color: rgba(249, 250, 251, 0.9);
        }

        .pulse-line {
            stroke: #3c5257;
            stroke-width: 2;
            fill: none;
        }
    </style>
</head>
<body class="text-[#3c5257] antialiased">

    <nav class="fixed top-0 left-0 w-full z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <a href="/">
                <img src="{% static 'landing/img/logo.png' %}" alt="Prisma Med Logo" class="h-24 md:h-32 w-auto object-contain">
            </a>
            
            <div class="hidden md:block">
                <a href="#" class="text-lg font-bold uppercase tracking-widest hover:text-[#67c6ae] transition-colors">Innovación Médica</a>
            </div>
        </div>
    </nav>

    <header class="min-h-screen flex items-center pt-32 md:pt-0">
        <div class="max-w-7xl mx-auto px-6 py-16 flex flex-col md:flex-row items-center justify-between gap-12 w-full">
            
            <div class="md:w-1/2 space-y-8 text-center md:text-left">
                <div class="space-y-6">
                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight leading-tight">
                        
                        EL FUTURO DE LA <br> 
                        <span class="text-[#67c6ae]">GESTIÓN CLÍNICA ESTÁ AQUÍ</span>
                    </h1>
                    
                    <p class="text-lg md:text-xl text-gray-700 max-w-2xl mx-auto md:mx-0 font-medium">
                        Optimice Quirófanos, APS y Ópticas con Inteligencia Artificial.
                    </p>
                </div>

                <div class="mt-12 space-y-6">
                   
                    
                    <div class="items-left justify-left md:justify-start animate-status">
                        <!-- <span class="status-dot"></span> -->
                        <p class="text-sm font-bold text-[#2559B8] tracking-[0.3em] uppercase">
                            Nuestra plataforma estará disponible muy pronto.
                        </p>
                    </div>
                </div>
            </div>

            <div class="md:w-1/2 w-full">
                <div class="software-window">
                    <div class="window-header">
                        <div class="flex">
                            <div class="dot dot-red"></div>
                            <div class="dot dot-yellow"></div>
                            <div class="dot dot-green"></div>
                        </div>
                    </div>

                    <div class="p-8 space-y-8">
                        <div class="space-y-6">
                            <div class="flex items-center justify-between">
                                
                                <h3 class="text-2xl font-bold text-[#3c5257]">
                                    <svg width="36px" height="36px" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <g id="SVGRepo_bgCarrier" stroke-width="0"/>
                                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>
                                        <g id="SVGRepo_iconCarrier"> <rect width="48" height="48" fill="white" fill-opacity="0.01"/> <rect x="17" y="4" width="14" height="27" rx="7" fill="#2F88FF" stroke="#000000" stroke-width="4" stroke-linejoin="round"/> <path d="M9 23C9 31.2843 15.7157 38 24 38C32.2843 38 39 31.2843 39 23" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/> <path d="M24 38V44" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/> </g>
                                    </svg>
                                    SCRIBE MÉDICO
                                </h3>
                                    
                                <svg class="w-24 h-8" viewBox="0 0 100 30">
                                    <path class="pulse-line" d="M0 15 L20 15 L25 5 L35 25 L40 15 L60 15 L65 10 L70 20 L75 15 L100 15" />
                                </svg>
                            </div>
                            
                            <textarea class="scribe-textarea" readonly>
Automatiza tus notas de evolución y reportes clínicos. Con el Scribe de Prisma Med, la historia médica está lista al terminar la consulta. Eficiencia absoluta para tu práctica médica. 
                            </textarea>
                        </div>

                        <div class="bg-white/50 border border-gray-200 rounded-xl p-6 flex items-center justify-between shadow-inner">
                            <p class="font-bold text-lg text-gray-700">Mientras el MÉDICO habla la IA SCRIBE...</p>
                            <div class="flex space-x-2">
                                <div class="w-3 h-3 bg-[#67c6ae] rounded-full animate-bounce"></div>
                                <div class="w-3 h-3 bg-[#67c6ae] rounded-full animate-bounce [animation-delay:-.3s]"></div>
                                <div class="w-3 h-3 bg-[#67c6ae] rounded-full animate-bounce [animation-delay:-.5s]"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

</body>
</html>
